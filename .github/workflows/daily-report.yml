name: 台股每日技術分析報告

on:
  schedule:
    # 每天 08:30 台灣時間 (00:30 UTC)
    - cron: '30 0 * * 1-5'
  workflow_dispatch:  # 手動觸發

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate report
        run: |
          cd scripts
          python3 generate_html.py
      
      - name: Move HTML to root
        run: |
          mv scripts/../index.html ./index.html || mv index.html ./index.html
      
      - name: Commit and push
        run: |
          git config --local user.email "openclaw@heymaxclaw"
          git config --local user.name "OpenClaw Bot"
          git add -A
          git diff --staged --quiet && echo "No changes" || git commit -m "Update daily report: $(date +'%Y-%m-%d %H:%M')"
          git push
